# ===============================
# DATABASE
# ===============================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/cvoptimizer}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===============================
# FLYWAY
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration


# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# INTERVIEW SESSION
# ===============================
interview.session.ttl-ms=3600000
interview.session.cleanup-interval-ms=300000

# ===============================
# RAG
# ===============================
rag.embedding.dimension=1536
rag.search.default-limit=5
rag.bootstrap.enabled=true
rag.bootstrap.source=question_bank

# ===============================
# AI EVALUATION
# ===============================
# ===============================
# JWT
# ===============================
# Base64-encoded 256-bit key — change this before any real deployment
jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXNlY3JldC1rZXktZm9yLWRldi1vbmx5LXBsZWFzZS1jaGFuZ2UtaXQ=}
jwt.expiration-ms=86400000

# ===============================
# AI EVALUATION
# ===============================
ai.evaluation.enabled=true
ai.evaluation.api-key=${OPENAI_API_KEY:}
ai.evaluation.model=gpt-4o
ai.evaluation.base-url=https://api.openai.com/v1
ai.evaluation.max-context-items=3
ai.evaluation.max-output-tokens=500
ai.evaluation.reasoning-effort=low